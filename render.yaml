services:
  - type: web
    name: unwall-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: PORT
        value: 4000
      - key: CORS_ORIGIN
        value: "*"
